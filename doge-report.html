<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE-USDT 合约行情报告</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .update-time {
            color: #888;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-color: transparent;
        }

        .price-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .price-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .price-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .price-up { color: #00ff88; }
        .price-down { color: #ff4757; }

        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #chart {
            width: 100%;
            height: 500px;
        }

        .boll-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .boll-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .boll-title {
            font-size: 1rem;
            color: #00d2ff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .boll-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .boll-item {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .boll-item-label {
            font-size: 0.75rem;
            color: #888;
        }

        .boll-item-value {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .status-normal { background: rgba(0,210,255,0.2); color: #00d2ff; }
        .status-near { background: rgba(255,200,0,0.2); color: #ffc800; }
        .status-touch { background: rgba(255,71,87,0.2); color: #ff4757; }

        .kline-table-section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .kline-table-section h2 {
            margin-bottom: 15px;
            color: #00d2ff;
        }

        .kline-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .kline-table th,
        .kline-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .kline-table th {
            background: rgba(0,0,0,0.3);
            color: #888;
            font-weight: normal;
        }

        .kline-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .green { color: #00ff88; }
        .red { color: #ff4757; }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85rem;
        }

        .refresh-btn {
            margin-left: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            #chart { height: 350px; }
            .price-value { font-size: 1.4rem; }
            .boll-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐕 DOGE-USDT 合约行情报告</h1>
            <div class="update-time">
                更新时间: <span id="updateTime">加载中...</span>
                <button class="refresh-btn" onclick="location.reload()">🔄 刷新</button>
            </div>
        </header>

        <div class="price-header">
            <div class="price-card">
                <div class="price-label">当前价格 (USDT)</div>
                <div class="price-value price-up" id="currentPrice">--</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 涨跌幅</div>
                <div class="price-value" id="change24h">--</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 最高</div>
                <div class="price-value" id="high24h">--</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 最低</div>
                <div class="price-value" id="low24h">--</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-period="H1" onclick="switchPeriod('H1')">📈 H1 (1小时)</button>
            <button class="tab-btn" data-period="H4" onclick="switchPeriod('H4')">📊 H4 (4小时)</button>
            <button class="tab-btn" data-period="1D" onclick="switchPeriod('1D')">📅 日线</button>
        </div>

        <div class="chart-container">
            <div id="chart"></div>
        </div>

        <div class="boll-info">
            <div class="boll-card">
                <div class="boll-title">布林带分析 (H1)</div>
                <div class="boll-grid">
                    <div class="boll-item">
                        <div class="boll-item-label">上轨</div>
                        <div class="boll-item-value red" id="h1Upper">--</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">中轨</div>
                        <div class="boll-item-value" id="h1Middle">--</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">下轨</div>
                        <div class="boll-item-value green" id="h1Lower">--</div>
                    </div>
                </div>
                <div class="status-tag status-normal" id="h1Status">计算中...</div>
            </div>
            <div class="boll-card">
                <div class="boll-title">布林带分析 (H4)</div>
                <div class="boll-grid">
                    <div class="boll-item">
                        <div class="boll-item-label">上轨</div>
                        <div class="boll-item-value red" id="h4Upper">--</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">中轨</div>
                        <div class="boll-item-value" id="h4Middle">--</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">下轨</div>
                        <div class="boll-item-value green" id="h4Lower">--</div>
                    </div>
                </div>
                <div class="status-tag status-normal" id="h4Status">计算中...</div>
            </div>
        </div>

        <div class="kline-table-section">
            <h2>📊 最近 K 线数据</h2>
            <table class="kline-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>开盘</th>
                        <th>最高</th>
                        <th>最低</th>
                        <th>收盘</th>
                        <th>涨跌幅</th>
                    </tr>
                </thead>
                <tbody id="klineTable">
                </tbody>
            </table>
        </div>

        <footer>
            <p>📈 数据来源: OKX API | 由 WorkBuddy 自动生成</p>
        </footer>
    </div>

    <script src="kline-data.js"></script>
    <script>
        let chart, candleSeries;
        let currentPeriod = 'H1';

        // 计算布林带
        function calcBollinger(data, period = 20, mult = 2) {
            if (data.length < period) return null;
            const recent = data.slice(-period);
            const ma = recent.reduce((sum, d) => sum + d.close, 0) / period;
            const variance = recent.reduce((sum, d) => sum + Math.pow(d.close - ma, 2), 0) / period;
            const std = Math.sqrt(variance);
            return {
                upper: ma + mult * std,
                middle: ma,
                lower: ma - mult * std
            };
        }

        // 初始化图表
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: {
                    background: { type: 'solid', color: 'transparent' },
                    textColor: '#ddd',
                },
                grid: {
                    vertLines: { color: 'rgba(255,255,255,0.1)' },
                    horzLines: { color: 'rgba(255,255,255,0.1)' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: 'rgba(255,255,255,0.2)',
                },
                timeScale: {
                    borderColor: 'rgba(255,255,255,0.2)',
                    timeVisible: true,
                },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff4757',
                borderUpColor: '#00ff88',
                borderDownColor: '#ff4757',
                wickUpColor: '#00ff88',
                wickDownColor: '#ff4757',
            });
        }

        // 切换周期
        function switchPeriod(period) {
            currentPeriod = period;
            
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.period === period) {
                    btn.classList.add('active');
                }
            });
            
            // 更新图表数据
            if (klineData[period] && candleSeries) {
                candleSeries.setData(klineData[period]);
                chart.timeScale().fitContent();
            }
            
            // 更新K线表格
            updateKlineTable(period);
        }

        // 更新K线表格
        function updateKlineTable(period) {
            const data = klineData[period] || [];
            const tbody = document.getElementById('klineTable');
            tbody.innerHTML = '';
            
            const recentData = data.slice(-15).reverse();
            
            recentData.forEach((item, index) => {
                const date = new Date(item.time * 1000);
                const timeStr = period === '1D' 
                    ? date.toLocaleDateString('zh-CN')
                    : `${date.getHours().toString().padStart(2, '0')}:00`;
                
                const change = index < recentData.length - 1 
                    ? ((item.close - recentData[index + 1].close) / recentData[index + 1].close * 100)
                    : 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${timeStr}</td>
                    <td>${item.open.toFixed(5)}</td>
                    <td class="green">${item.high.toFixed(5)}</td>
                    <td class="red">${item.low.toFixed(5)}</td>
                    <td>${item.close.toFixed(5)}</td>
                    <td class="${change >= 0 ? 'green' : 'red'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 更新价格信息
        function updatePriceInfo() {
            const h1Data = klineData['H1'] || [];
            if (h1Data.length > 0) {
                const latest = h1Data[h1Data.length - 1];
                const first = h1Data[0];
                
                document.getElementById('currentPrice').textContent = latest.close.toFixed(5);
                
                const change = ((latest.close - first.open) / first.open * 100);
                const changeEl = document.getElementById('change24h');
                changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'price-value ' + (change >= 0 ? 'green' : 'red');
                
                // 计算24h高低
                const h1Last24 = h1Data.slice(-24);
                const high24 = Math.max(...h1Last24.map(d => d.high));
                const low24 = Math.min(...h1Last24.map(d => d.low));
                document.getElementById('high24h').textContent = high24.toFixed(5);
                document.getElementById('low24h').textContent = low24.toFixed(5);
            }
        }

        // 更新布林带信息
        function updateBollInfo() {
            const h1Data = klineData['H1'] || [];
            const h4Data = klineData['H4'] || [];
            
            const h1Boll = calcBollinger(h1Data);
            const h4Boll = calcBollinger(h4Data);
            
            if (h1Boll) {
                document.getElementById('h1Upper').textContent = h1Boll.upper.toFixed(5);
                document.getElementById('h1Middle').textContent = h1Boll.middle.toFixed(5);
                document.getElementById('h1Lower').textContent = h1Boll.lower.toFixed(5);
                
                const latest = h1Data[h1Data.length - 1];
                const distUpper = (h1Boll.upper - latest.close) / h1Boll.upper;
                const distLower = (latest.close - h1Boll.lower) / h1Boll.lower;
                
                const h1Status = document.getElementById('h1Status');
                if (distUpper <= 0.002) {
                    h1Status.textContent = '靠近上轨';
                    h1Status.className = 'status-tag status-touch';
                } else if (distLower <= 0.002) {
                    h1Status.textContent = '靠近下轨';
                    h1Status.className = 'status-tag status-touch';
                } else if (latest.close > h1Boll.middle) {
                    h1Status.textContent = '中轨上方运行';
                    h1Status.className = 'status-tag status-normal';
                } else {
                    h1Status.textContent = '中轨下方运行';
                    h1Status.className = 'status-tag status-normal';
                }
            }
            
            if (h4Boll) {
                document.getElementById('h4Upper').textContent = h4Boll.upper.toFixed(5);
                document.getElementById('h4Middle').textContent = h4Boll.middle.toFixed(5);
                document.getElementById('h4Lower').textContent = h4Boll.lower.toFixed(5);
                
                const latest = h4Data[h4Data.length - 1];
                const distUpper = (h4Boll.upper - latest.close) / h4Boll.upper;
                const distLower = (latest.close - h4Boll.lower) / h4Boll.lower;
                
                const h4Status = document.getElementById('h4Status');
                if (distUpper <= 0.002) {
                    h4Status.textContent = '靠近上轨';
                    h4Status.className = 'status-tag status-touch';
                } else if (distLower <= 0.002) {
                    h4Status.textContent = '靠近下轨';
                    h4Status.className = 'status-tag status-touch';
                } else if (latest.close > h4Boll.middle) {
                    h4Status.textContent = '中轨上方运行';
                    h4Status.className = 'status-tag status-normal';
                } else {
                    h4Status.textContent = '中轨下方运行';
                    h4Status.className = 'status-tag status-normal';
                }
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            initChart();
            
            // 设置K线数据
            if (klineData['H1']) {
                candleSeries.setData(klineData['H1']);
                chart.timeScale().fitContent();
            }
            
            // 更新所有信息
            updatePriceInfo();
            updateBollInfo();
            updateKlineTable('H1');
            
            // 更新时间
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        });

        // 窗口大小变化时调整图表
        window.addEventListener('resize', function() {
            if (chart) {
                chart.resize(document.getElementById('chart').clientWidth, 500);
            }
        });
    </script>
</body>
</html>
