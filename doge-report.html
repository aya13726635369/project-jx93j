<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE-USDT 合约行情报告</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .update-time {
            color: #888;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-color: transparent;
        }

        .price-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .price-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .price-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .price-up { color: #00ff88; }
        .price-down { color: #ff4757; }

        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #chart {
            width: 100%;
            height: 500px;
        }

        .boll-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .boll-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .boll-title {
            font-size: 1rem;
            color: #00d2ff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .boll-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .boll-item {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .boll-item-label {
            font-size: 0.75rem;
            color: #888;
        }

        .boll-item-value {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .status-normal { background: rgba(0,210,255,0.2); color: #00d2ff; }
        .status-near { background: rgba(255,200,0,0.2); color: #ffc800; }
        .status-touch { background: rgba(255,71,87,0.2); color: #ff4757; }

        .kline-table-section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .kline-table-section h2 {
            margin-bottom: 15px;
            color: #00d2ff;
        }

        .kline-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .kline-table th,
        .kline-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .kline-table th {
            background: rgba(0,0,0,0.3);
            color: #888;
            font-weight: normal;
        }

        .kline-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .green { color: #00ff88; }
        .red { color: #ff4757; }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85rem;
        }

        .refresh-btn {
            margin-left: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            #chart { height: 350px; }
            .price-value { font-size: 1.4rem; }
            .boll-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐕 DOGE-USDT 合约行情报告</h1>
            <div class="update-time">
                更新时间: <span id="updateTime">2026-03-18 10:00:00</span>
                <button class="refresh-btn" onclick="location.reload()">🔄 刷新</button>
            </div>
        </header>

        <div class="price-header">
            <div class="price-card">
                <div class="price-label">当前价格 (USDT)</div>
                <div class="price-value price-up" id="currentPrice">0.09948</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 涨跌幅</div>
                <div class="price-value green" id="change24h">+0.58%</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 最高</div>
                <div class="price-value" id="high24h">0.10356</div>
            </div>
            <div class="price-card">
                <div class="price-label">24h 最低</div>
                <div class="price-value" id="low24h">0.09436</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchPeriod('H1')">📈 H1 (1小时)</button>
            <button class="tab-btn" onclick="switchPeriod('H4')">📊 H4 (4小时)</button>
            <button class="tab-btn" onclick="switchPeriod('1D')">📅 日线</button>
        </div>

        <div class="chart-container">
            <div id="chart"></div>
        </div>

        <div class="boll-info">
            <div class="boll-card">
                <div class="boll-title">布林带分析 (H1)</div>
                <div class="boll-grid">
                    <div class="boll-item">
                        <div class="boll-item-label">上轨</div>
                        <div class="boll-item-value red">0.10140</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">中轨</div>
                        <div class="boll-item-value">0.10019</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">下轨</div>
                        <div class="boll-item-value green">0.09898</div>
                    </div>
                </div>
                <div class="status-tag status-normal" id="h1Status">中轨下方运行</div>
            </div>
            <div class="boll-card">
                <div class="boll-title">布林带分析 (H4)</div>
                <div class="boll-grid">
                    <div class="boll-item">
                        <div class="boll-item-label">上轨</div>
                        <div class="boll-item-value red">0.10393</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">中轨</div>
                        <div class="boll-item-value">0.09901</div>
                    </div>
                    <div class="boll-item">
                        <div class="boll-item-label">下轨</div>
                        <div class="boll-item-value green">0.09408</div>
                    </div>
                </div>
                <div class="status-tag status-normal" id="h4Status">中轨附近运行</div>
            </div>
        </div>

        <div class="kline-table-section">
            <h2>📊 最近 K 线数据</h2>
            <table class="kline-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>开盘</th>
                        <th>最高</th>
                        <th>最低</th>
                        <th>收盘</th>
                        <th>涨跌幅</th>
                    </tr>
                </thead>
                <tbody id="klineTable">
                </tbody>
            </table>
        </div>

        <footer>
            <p>📈 数据来源: OKX API | 由 WorkBuddy 自动生成</p>
        </footer>
    </div>

    <script src="kline-data.js"></script>
    <script>
        // 初始化图表
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: {
                background: { type: 'solid', color: 'transparent' },
                textColor: '#ddd',
            },
            grid: {
                vertLines: { color: 'rgba(255,255,255,0.1)' },
                horzLines: { color: 'rgba(255,255,255,0.1)' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: 'rgba(255,255,255,0.2)',
            },
            timeScale: {
                borderColor: 'rgba(255,255,255,0.2)',
                timeVisible: true,
            },
        });

        // 添加K线系列
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4757',
            borderUpColor: '#00ff88',
            borderDownColor: '#ff4757',
            wickUpColor: '#00ff88',
            wickDownColor: '#ff4757',
        });

        let currentPeriod = 'H1';

        // 切换周期
        function switchPeriod(period) {
            currentPeriod = period;
            
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新图表数据
            if (klineData[period]) {
                candleSeries.setData(klineData[period]);
                chart.timeScale().fitContent();
            }
            
            // 更新K线表格
            updateKlineTable(period);
        }

        // 更新K线表格
        function updateKlineTable(period) {
            const data = klineData[period] || [];
            const tbody = document.getElementById('klineTable');
            tbody.innerHTML = '';
            
            const recentData = data.slice(-15).reverse();
            
            recentData.forEach((item, index) => {
                const date = new Date(item.time * 1000);
                const timeStr = period === '1D' 
                    ? date.toLocaleDateString('zh-CN')
                    : `${date.getHours().toString().padStart(2, '0')}:00`;
                
                const prev = data[data.length - 15 + index - 1];
                let change = 0;
                if (prev && index < recentData.length - 1) {
                    change = ((item.close - prev.close) / prev.close * 100);
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${timeStr}</td>
                    <td>${item.open.toFixed(5)}</td>
                    <td class="green">${item.high.toFixed(5)}</td>
                    <td class="red">${item.low.toFixed(5)}</td>
                    <td>${item.close.toFixed(5)}</td>
                    <td class="${change >= 0 ? 'green' : 'red'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            // 更新最新价格
            const h1Data = klineData['H1'] || [];
            if (h1Data.length > 0) {
                const latest = h1Data[h1Data.length - 1];
                document.getElementById('currentPrice').textContent = latest.close.toFixed(5);
                
                const first = h1Data[0];
                const change = ((latest.close - first.open) / first.open * 100);
                const changeEl = document.getElementById('change24h');
                changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'price-value ' + (change >= 0 ? 'green' : 'red');
            }
            
            // 设置K线数据
            candleSeries.setData(klineData['H1']);
            chart.timeScale().fitContent();
            
            // 更新表格
            updateKlineTable('H1');
            
            // 更新时间
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        });

        // 窗口大小变化时调整图表
        window.addEventListener('resize', function() {
            chart.resize(document.getElementById('chart').clientWidth, 500);
        });
    </script>
</body>
</html>
