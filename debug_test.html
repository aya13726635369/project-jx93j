<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE 数据测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>DOGE 数据加载测试</h1>
    <div id="test1" class="test">测试 1: RAW_DATA 检查中...</div>
    <div id="test2" class="test">测试 2: JSON 解析检查中...</div>
    <div id="test3" class="test">测试 3: 数据处理检查中...</div>
    <div id="result" class="test">结果: 等待中...</div>

<script>
// 测试 1: RAW_DATA 是否存在
const test1 = document.getElementById('test1');
if (typeof RAW_DATA !== 'undefined') {
    test1.textContent = '✓ 测试 1 通过: RAW_DATA 存在';
    test1.classList.add('success');
} else {
    test1.textContent = '✗ 测试 1 失败: RAW_DATA 不存在';
    test1.classList.add('error');
}

// 测试 2: JSON 解析
const test2 = document.getElementById('test2');
if (typeof RAW_DATA !== 'undefined' && RAW_DATA.code === '0') {
    test2.textContent = '✓ 测试 2 通过: RAW_DATA.code === "0"';
    test2.classList.add('success');
} else {
    test2.textContent = '✗ 测试 2 失败: RAW_DATA.code 不是 "0"';
    test2.classList.add('error');
}

// 测试 3: 数据处理
const test3 = document.getElementById('test3');
const result = document.getElementById('result');

if (typeof RAW_DATA !== 'undefined' && RAW_DATA.data && RAW_DATA.data.length > 0) {
    const lastCandle = RAW_DATA.data[0];
    const price = lastCandle[4];  // 收盘价
    const time = new Date(parseInt(lastCandle[0])).toLocaleString('zh-CN');
    
    test3.textContent = `✓ 测试 3 通过: 数据条数 = ${RAW_DATA.data.length}`;
    test3.classList.add('success');
    
    result.textContent = `最新价格: ${price} USDT | 更新时间: ${time}`;
    result.classList.add('success');
} else {
    test3.textContent = '✗ 测试 3 失败: 无法处理数据';
    test3.classList.add('error');
    result.textContent = '数据处理失败';
    result.classList.add('error');
}

console.log('测试完成');
</script>
</body>
</html>
