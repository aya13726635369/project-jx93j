<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试页面</title>
</head>
<body>
<h1>测试 DOGE 数据</h1>
<div id="status">加载中...</div>
<div id="price">--</div>
<div id="time">--</div>

<script>
const RAW_DATA = {"code": "0", "msg": "", "data": [["1774198800000", "0.09155", "0.09157", "0.09136", "0.09145", "21422.53", "21422530", "1959597.9934", "0"]]};

window.onload = function() {
    document.getElementById('status').textContent = '脚本已加载';
    console.log('RAW_DATA:', RAW_DATA);
    console.log('code:', RAW_DATA.code);
    
    if (RAW_DATA.code === '0' && RAW_DATA.data && RAW_DATA.data.length > 0) {
        document.getElementById('status').textContent = '数据正常';
        const lastCandle = RAW_DATA.data[RAW_DATA.data.length - 1];
        document.getElementById('price').textContent = '最新价格: $' + lastCandle[4];
        document.getElementById('time').textContent = '时间: ' + new Date(parseInt(lastCandle[0])).toLocaleString('zh-CN');
    } else {
        document.getElementById('status').textContent = '数据异常';
    }
};
</script>
</body>
</html>
