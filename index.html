<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 20px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.25rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .card-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .card-link:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 我的作品集</h1>
            <p>这里展示我的网页、图片、视频等内容</p>
        </header>

        <div class="grid" id="contentGrid">
            <!-- 内容卡片 -->
            <div class="card">
                <div class="card-image">🖼️</div>
                <div class="card-content">
                    <div class="card-title">示例图片</div>
                    <div class="card-desc">这是一张示例图片，你可以替换成自己的内容</div>
                    <a href="#" class="card-link">查看详情</a>
                </div>
            </div>

            <div class="card">
                <div class="card-image">📄</div>
                <div class="card-content">
                    <div class="card-title">示例网页</div>
                    <div class="card-desc">这是一个嵌入式网页示例</div>
                    <a href="#" class="card-link">查看详情</a>
                </div>
            </div>

            <div class="card">
                <div class="card-image">🎬</div>
                <div class="card-content">
                    <div class="card-title">示例视频</div>
                    <div class="card-desc">这里可以放视频内容</div>
                    <a href="#" class="card-link">查看详情</a>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 我的作品集 · 由 WorkBuddy 生成</p>
        </footer>
    </div>
</body>
</html>
